name: Build and Deploy to OpenShift

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/demoapi:latest

      - name: Install oc CLI
        uses: redhat-actions/oc-installer@v1
        with:
          oc_version: "4.15"

      - name: Log in to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true

      - name: Switch to namespace
        run: oc project hanceup-dev

      - name: Create or update app
        run: |
          oc set image deployment/demoapi demoapi=ghcr.io/${{ github.repository_owner }}/demoapi:latest 2>/dev/null || \
          oc new-app --image=ghcr.io/${{ github.repository_owner }}/demoapi:latest --name=demoapi

      - name: Expose service
        run: oc expose service/demoapi 2>/dev/null || true
